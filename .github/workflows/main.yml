name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # เปลี่ยนจาก --onedir เป็น --onefile
        pyinstaller --noconsole --onefile --icon=LogoV.ico AclassStoreLiveV2.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AclassStoreLiveV2-Windows
        # ระบุ path ไปที่ตัวไฟล์ .exe โดยตรงในโฟลเดอร์ dist
        path: dist/AclassStoreLiveV2.exe
