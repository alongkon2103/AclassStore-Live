name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # อนุญาตให้กดปุ่มสั่ง Build เองได้

jobs:
  build:
    runs-on: windows-latest # สั่งให้ใช้คอม Windows รัน

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # ใช้เวอร์ชัน 3.12 เพื่อความเสถียรกับ Nuitka

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with Nuitka
      run: |
        python -m nuitka --assume-yes-for-downloads --standalone --windows-console-mode=disable --enable-plugin=pyqt5 --low-memory --windows-icon-from-ico=LogoV.ico AclassStoreLive.py

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AclassStoreLive-Windows
        path: AclassStoreLive.dist/ # อัปโหลดทั้งโฟลเดอร์ที่ได้จากการ Build
